name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # CI installs the lint/type/test tooling plus only the lightweight runtime deps the
      # current code actually imports (pydantic + PyYAML for config). The heavy ML stack
      # (torch, ultralytics, opencv) is intentionally not installed until a milestone needs
      # it, keeping CI fast and reliable.
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov types-PyYAML
          pip install -e . --no-deps
          pip install pydantic pyyaml pycuber numpy opencv-python-headless flask

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy

      - name: Pytest
        run: pytest --cov --cov-report=term-missing
